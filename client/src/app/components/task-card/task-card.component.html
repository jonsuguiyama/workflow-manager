<div class="task-card">
  <div class="card-top">
    <h3>{{ task.title }}</h3>
    
    <span
      class="priority"
      [class.low]="task.priority === 'low'"
      [class.medium]="task.priority === 'medium'"
      [class.high]="task.priority === 'high'">
      {{ task.priority || 'low' }}
    </span>
  </div>
  
  <p>{{ task.description }}</p>
  
  <div class="actions">
    <button class="secondary" (click)="toggle.emit()">
      {{ task.status === 'done' ? 'Reopen' : 'Done' }}
    </button>
    
    <button class="secondary" (click)="edit.emit()">
      Edit
    </button>
    
    <button class="danger" (click)="delete.emit()">
      Delete
    </button>
  </div>
</div>
